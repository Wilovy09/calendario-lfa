<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var l = window.location
      var segments = l.pathname.split('/').filter(Boolean)
      // Only redirect if there's a sub-path beyond the base (e.g. /calendario-lfa/game/1)
      if (segments.length > 1) {
        var base = '/' + segments[0]
        var path = segments.slice(1).join('/')
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          base + '/?p=' + encodeURIComponent(path) +
          l.hash
        )
      }
    </script>
  </head>
</html>
